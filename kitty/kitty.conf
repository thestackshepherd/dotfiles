# theme settings
include current-theme.conf

# cursor
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval -1

enable_audio_bell no
tab_bar_style powerline
copy_on_select yes
mouse_map right press ungrabbed paste_from_selection

# Font Settings
font_size 10.0
font_family      family='LiterationMono Nerd Font Mono' postscript_name=LiterationMonoNFM
bold_font        auto
italic_font      auto
bold_italic_font auto
